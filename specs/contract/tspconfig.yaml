# Compiles the TypeSpec contract into the canonical artifacts under specs/.
#   - OpenAPI 3.1  -> specs/openapi.yaml        (REST contract)
#   - JSON Schema  -> specs/schemas/*.json      (shared payloads: entities + WS events)
emit:
  - "@typespec/openapi3"
  - "@typespec/json-schema"
options:
  "@typespec/openapi3":
    emitter-output-dir: "{project-root}/.."
    openapi-versions:
      - "3.1.0"
    output-file: "openapi.yaml"
  "@typespec/json-schema":
    emitter-output-dir: "{project-root}/../schemas"
    file-type: "json"
